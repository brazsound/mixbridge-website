<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mix Bridge – Pro Tools Stem & Bounce Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e5e5e5;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 3rem;
      max-width: 420px;
      text-align: center;
    }
    h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.5rem; }
    .tagline { color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: #0a84ff;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.875rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #409cff; }
    .btn:disabled { opacity: 0.6; cursor: wait; }
    .version { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 1.5rem; }
    .error { color: #ff6b6b; font-size: 0.9rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mix Bridge</h1>
    <p class="tagline">Pro Tools stem and bounce automation</p>
    <a id="download" class="btn" href="#">Download for Mac</a>
    <p id="version" class="version"></p>
    <p id="error" class="error" style="display:none;"></p>
  </div>

  <script>
    const GITHUB_API = 'https://api.github.com/repos/Meteteus/mix-bridge/releases/latest';

    async function init() {
      const btn = document.getElementById('download');
      const versionEl = document.getElementById('version');
      const errorEl = document.getElementById('error');

      try {
        btn.textContent = 'Getting download…';
        btn.disabled = true;

        const res = await fetch(GITHUB_API);
        if (!res.ok) throw new Error('Could not fetch release info');
        const data = await res.json();

        const dmg = data.assets?.find(a => a.name.endsWith('.dmg'));
        if (!dmg) throw new Error('No Mac installer found');

        btn.href = dmg.browser_download_url;
        btn.textContent = 'Download for Mac';
        btn.disabled = false;
        versionEl.textContent = 'Version ' + data.tag_name.replace(/^v/, '');
      } catch (err) {
        btn.textContent = 'Download for Mac';
        btn.disabled = false;
        btn.href = 'https://github.com/Meteteus/mix-bridge/releases/latest';
        versionEl.textContent = '';
        errorEl.textContent = 'Click to open download page.';
        errorEl.style.display = 'block';
      }
    }

    init();
  </script>
</body>
</html>
