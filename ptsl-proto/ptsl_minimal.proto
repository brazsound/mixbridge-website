syntax = "proto3";
package ptsl;

// Minimal PTSL proto for SendGrpcRequest only.
// Request/response bodies are sent as JSON strings; see PTSL.proto for schemas.

service PTSL {
  rpc SendGrpcRequest (Request) returns (Response);
}

message RequestHeader {
  string task_id = 1;
  int32 command = 2;
  int32 version = 3;
  string session_id = 4;
  int32 version_minor = 5;
  int32 version_revision = 6;
  string versioned_request_header_json = 7;
}

message Request {
  RequestHeader header = 1;
  string request_body_json = 2;
}

message ResponseHeader {
  string task_id = 1;
  int32 command = 2;
  int32 status = 3;
  int32 progress = 4;
  int32 version = 5;
  int32 version_minor = 6;
  int32 version_revision = 7;
  string versioned_response_header_json = 8;
}

message Response {
  ResponseHeader header = 1;
  string response_body_json = 2;
  string response_error_json = 3;
}
